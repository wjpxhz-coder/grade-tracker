<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f6f5f0" />
    <meta name="description" content="只属于两个人的成绩成长手账" />
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <script>
      try {
        const savedTheme = localStorage.getItem('grade-journal-theme')
        const useDark = savedTheme === 'dark' || (savedTheme !== 'light' && matchMedia('(prefers-color-scheme: dark)').matches)
        document.documentElement.dataset.theme = useDark ? 'dark' : 'light'
        document.documentElement.style.colorScheme = useDark ? 'dark' : 'light'
        document.querySelector('meta[name="theme-color"]').content = useDark ? '#111713' : '#f6f5f0'
      } catch { /* ThemeProvider will apply the default. */ }
    </script>
    <title>我们的成绩手账</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
